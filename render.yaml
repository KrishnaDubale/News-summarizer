services:
  - type: web
    name: ai-news-summarizer
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.5
      - key: ENABLE_LLM_SUMMARY
        value: "true"
      - key: NEWS_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
